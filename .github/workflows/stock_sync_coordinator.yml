name: Stock Sync Coordinator

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  # ── Phase 1: Discover all pages, split into chunks ────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      chunk_count: ${{ steps.split.outputs.chunk_count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: python stock_sync_discover.py
      - id: split
        run: echo "chunk_count=$(cat chunk_count.txt)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: page-chunks
          path: page_chunks/
          retention-days: 1

  # ── Phase 2: Each chunk on its own runner = fresh IP ─────────────────────
  scrape:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.discover.outputs.chunk_count) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml

      - uses: actions/download-artifact@v4
        with:
          name: page-chunks
          path: page_chunks/

      # Try to restore a saved checkpoint for this chunk (only exists on resume)
      - name: Restore checkpoint
        uses: actions/download-artifact@v4
        with:
          name: progress-chunk-${{ matrix.chunk }}
          path: .
        continue-on-error: true

      # Run scraper — captures exit code into output, job itself always exits 0
      - name: Scrape
        id: scrape
        run: |
          if [ -f progress.json ]; then
            python stock_sync_scrape.py --chunk ${{ matrix.chunk }} --resume
          else
            python stock_sync_scrape.py --chunk ${{ matrix.chunk }}
          fi
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      # Always upload whatever results we got (full or partial)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chunk-result-${{ matrix.chunk }}
          path: chunk_results/
          retention-days: 1

      # Only if exit code was exactly 2 (genuine block, not a crash):
      # save checkpoint and trigger ONE new coordinator run to resume
      - name: Save checkpoint on block
        if: steps.scrape.outputs.exit_code == '2'
        uses: actions/upload-artifact@v4
        with:
          name: progress-chunk-${{ matrix.chunk }}
          path: progress.json
          retention-days: 2

      - name: Trigger resume run on block
        if: steps.scrape.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Chunk ${{ matrix.chunk }} blocked — triggering one resume run..."
          gh workflow run stock_sync_coordinator.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}

  # ── Phase 3: Merge all chunks + update Shopify ───────────────────────────
  update_shopify:
    needs: scrape
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml

      - name: Download all chunk results
        uses: actions/download-artifact@v4
        with:
          pattern: chunk-result-*
          path: chunk_results/
          merge-multiple: true

      - name: Merge and update Shopify
        run: python stock_sync_update.py
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sync_log.json stock_map.json
          git diff --staged --quiet || git commit -m "sync $(date -u +'%Y-%m-%d')"
          git push
