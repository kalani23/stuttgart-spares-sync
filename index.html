<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stuttgart Spares — Stock Sync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0b;
    --surface:  #111113;
    --border:   #1e1e22;
    --accent:   #e8ff47;
    --red:      #ff4d4d;
    --green:    #47ffb2;
    --muted:    #555560;
    --text:     #e8e8f0;
    --subtext:  #888898;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,11,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-mark svg { width: 18px; height: 18px; }

  .logo h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .logo span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: block;
    letter-spacing: 0.08em;
  }

  #trigger-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #trigger-btn:hover { background: #f5ff6e; transform: translateY(-1px); }
  #trigger-btn:active { transform: translateY(0); }
  #trigger-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  #trigger-btn .spinner {
    width: 14px; height: 14px;
    border: 2px solid #00000040;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  #trigger-btn.loading .spinner { display: block; }
  #trigger-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Main layout ── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  /* ── Status banner ── */
  #status-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 32px;
    animation: fadeIn 0.4s ease;
  }

  #status-banner.success { border-color: #47ffb240; background: #47ffb208; }
  #status-banner.error   { border-color: #ff4d4d40; background: #ff4d4d08; }

  .status-left { display: flex; align-items: center; gap: 14px; }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.success { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.error   { background: var(--red);   box-shadow: 0 0 8px var(--red); }
  .status-dot.pulse   { animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .status-time {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--subtext);
  }

  .status-elapsed {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    animation: fadeUp 0.4s ease both;
  }

  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.10s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }
  .stat-card:nth-child(4) { animation-delay: 0.20s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--subtext);
    margin-bottom: 12px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }
  .stat-value.accent { color: var(--accent); }

  .stat-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── Two column layout ── */
  .cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  /* ── Chart ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--subtext);
    margin-bottom: 20px;
  }

  /* Stock bar */
  .stock-bar-wrap {
    margin-top: 8px;
  }

  .stock-bar {
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    overflow: hidden;
    margin: 8px 0;
  }

  .stock-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--green);
    transition: width 1s ease;
  }

  .stock-bar-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--subtext);
  }

  .stock-bar-labels span:first-child { color: var(--green); }
  .stock-bar-labels span:last-child  { color: var(--red); }

  /* Sparkline */
  #sparkline-canvas {
    width: 100%;
    height: 120px;
    display: block;
  }

  /* ── History table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .table-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 24px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #ffffff06; }

  tbody td {
    padding: 14px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--subtext);
  }

  td.date-col { color: var(--text); font-size: 12px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .badge.success { background: #47ffb215; color: var(--green); }
  .badge.error   { background: #ff4d4d15; color: var(--red); }
  .badge.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  td.updated-col { color: var(--accent); }
  td.skus-col    { color: var(--text); }

  /* ── Trigger modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  #modal-overlay.visible { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 480px;
    width: 90%;
    animation: fadeUp 0.3s ease;
  }

  #modal h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  #modal p {
    color: var(--subtext);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .modal-input-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--subtext);
    margin-bottom: 8px;
    display: block;
  }

  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--subtext);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .btn-confirm {
    background: var(--accent);
    border: none;
    color: #000;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-confirm:hover { background: #f5ff6e; }

  #toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: #47ffb240; color: var(--green); }
  #toast.error   { border-color: #ff4d4d40; color: var(--red); }

  .loading-state {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.06em;
  }

  .loading-state .dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }

  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }

  /* ── Schedule info ── */
  .schedule-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  .schedule-info svg { width: 12px; height: 12px; opacity: 0.5; }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .cols { grid-template-columns: 1fr; }
    main { padding: 24px; }
    header { padding: 20px 24px; }
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none">
        <path d="M9 2L15 6V12L9 16L3 12V6L9 2Z" stroke="#000" stroke-width="1.5" fill="none"/>
        <circle cx="9" cy="9" r="2" fill="#000"/>
      </svg>
    </div>
    <div>
      <h1>Stuttgart Spares</h1>
      <span>Stock Sync Dashboard</span>
    </div>
  </div>
  <button id="trigger-btn" onclick="openModal()">
    <span class="spinner"></span>
    <span class="btn-text">▶ Trigger Sync</span>
  </button>
</header>

<main>
  <div id="loading" class="loading-state">Loading sync data<span class="dots"></span></div>
  <div id="dashboard" style="display:none">

    <!-- History table -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="card-title" style="margin:0">Run History</div>
        <div class="schedule-info">
          <svg viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M6 3.5V6L7.5 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Scheduled daily at 06:00 UTC
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Date / Time</th>
            <th>Status</th>
            <th>SKUs Found</th>
            <th>In Stock</th>
            <th>Updated</th>
            <th>Elapsed</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr><td colspan="6" style="text-align:center; padding:32px; color:var(--muted)">No runs yet</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Trigger Manual Sync</h2>
    <p>This will start a full stock sync immediately. Enter your GitHub Personal Access Token with <code style="background:#ffffff10; padding:2px 6px; border-radius:4px; font-size:12px;">workflow</code> scope.</p>
    <label class="modal-input-label">GitHub PAT Token</label>
    <input class="modal-input" type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <label class="modal-input-label">GitHub Repo (owner/repo)</label>
    <input class="modal-input" type="text" id="repo-input" placeholder="yourusername/stuttgart-spares-sync" value="">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="triggerSync()">▶ Run Now</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────

// Update this to your actual repo: "owner/repo-name"
const GITHUB_REPO = localStorage.getItem('gh_repo') || '';
const WORKFLOW_ID = 'stock_sync.yml';

// ── Load and render data ──────────────────────────────────────────────────────

async function loadData() {
  try {
    // Load sync_log.json from same repo (GitHub Pages serves it)
    const res = await fetch('./sync_log.json?t=' + Date.now());
    if (!res.ok) throw new Error('No sync log found');
    const logs = await res.json();
    render(logs);
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:var(--muted); padding:60px; text-align:center">No sync data yet — run the script once to populate this dashboard.</div>';
  }
}

function render(logs) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  // Latest run
  const latest = logs[logs.length - 1];

  // Status banner
  const isSuccess = latest.status !== 'error' && !latest.errors;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + (isSuccess ? 'success pulse' : 'error pulse');
  document.getElementById('status-label').textContent =
    isSuccess ? '✓ Last sync successful' : '⚠ Last sync had errors';
  document.getElementById('status-time').textContent =
    'Run at ' + formatDate(latest.run_at);
  document.getElementById('status-elapsed').textContent =
    latest.elapsed_sec ? `${latest.elapsed_sec}s (${(latest.elapsed_sec/60).toFixed(1)} min)` : '—';

  const banner = document.getElementById('status-banner');
  banner.className = isSuccess ? 'success' : 'error';

  // Stats
  const skus     = latest.partworks_skus || 0;
  const inStock  = latest.in_stock || 0;
  const outStock = latest.out_of_stock || (skus - inStock);
  const pctIn    = skus ? Math.round(inStock / skus * 100) : 0;

  document.getElementById('stat-skus').textContent      = fmt(skus);
  document.getElementById('stat-skus-sub').textContent  = `across all categories`;
  document.getElementById('stat-instock').textContent   = fmt(inStock);
  document.getElementById('stat-instock-pct').textContent = `${pctIn}% of catalogue`;
  document.getElementById('stat-outstock').textContent  = fmt(outStock);
  document.getElementById('stat-outstock-pct').textContent = `${100-pctIn}% of catalogue`;
  document.getElementById('stat-updated').textContent   = fmt(latest.updated || 0);
  document.getElementById('stat-nochange').textContent  = `${fmt(latest.no_change || 0)} unchanged`;

  // Stock bar
  document.getElementById('bar-instock-label').textContent = fmt(inStock) + ' in stock';
  document.getElementById('bar-total-label').textContent   = fmt(skus) + ' total';
  setTimeout(() => {
    document.getElementById('stock-bar-fill').style.width = pctIn + '%';
  }, 200);
  document.getElementById('bar-instock-pct').textContent  = pctIn + '% in stock';
  document.getElementById('bar-outstock-pct').textContent = (100-pctIn) + '% out of stock';

  // Shopify
  document.getElementById('shopify-total').textContent    = fmt(latest.shopify_products || 0);
  document.getElementById('shopify-notfound').textContent = fmt(latest.not_found || 0);

  // Sparkline
  drawSparkline(logs.slice(-20));

  // History table
  const tbody = document.getElementById('history-tbody');
  const rows = [...logs].reverse().slice(0, 30).map(run => {
    const ok = run.status !== 'error' && !run.errors;
    const badge = ok
      ? `<span class="badge success"><span class="dot"></span>Success</span>`
      : `<span class="badge error"><span class="dot"></span>Error</span>`;
    return `<tr>
      <td class="date-col">${formatDate(run.run_at)}</td>
      <td>${run.dry_run ? '<span class="badge" style="background:#ffffff10;color:var(--subtext)">Dry Run</span>' : badge}</td>
      <td class="skus-col">${fmt(run.partworks_skus || 0)}</td>
      <td style="color:var(--green)">${fmt(run.in_stock || 0)}</td>
      <td class="updated-col">${fmt(run.updated || 0)}</td>
      <td>${run.elapsed_sec ? run.elapsed_sec + 's' : '—'}</td>
    </tr>`;
  }).join('');
  tbody.innerHTML = rows || '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted)">No runs yet</td></tr>';
}

function drawSparkline(logs) {
  const canvas = document.getElementById('sparkline-canvas');
  const dpr    = window.devicePixelRatio || 1;
  const rect   = canvas.parentElement.getBoundingClientRect();
  canvas.width  = rect.width * dpr;
  canvas.height = 120 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = rect.width;
  const H = 120;
  const pad = { top: 10, bottom: 24, left: 4, right: 4 };

  const values = logs.map(r => r.updated || 0);
  const max    = Math.max(...values, 1);

  const barW   = (W - pad.left - pad.right) / Math.max(values.length, 1);
  const barGap = barW * 0.25;

  values.forEach((v, i) => {
    const x    = pad.left + i * barW + barGap / 2;
    const barH = ((v / max) * (H - pad.top - pad.bottom)) || 2;
    const y    = H - pad.bottom - barH;

    // Gradient
    const grad = ctx.createLinearGradient(0, y, 0, H - pad.bottom);
    grad.addColorStop(0, '#e8ff4788');
    grad.addColorStop(1, '#e8ff4720');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW - barGap, barH, 3);
    ctx.fill();

    // Value label on top
    if (v > 0) {
      ctx.fillStyle = '#888898';
      ctx.font = `${Math.min(9, barW * 0.6)}px 'DM Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(v, x + (barW - barGap) / 2, y - 3);
    }
  });

  // X-axis labels (dates)
  ctx.fillStyle = '#555560';
  ctx.font = "9px 'DM Mono', monospace";
  ctx.textAlign = 'center';
  logs.forEach((r, i) => {
    const x = pad.left + i * barW + (barW - barGap) / 2;
    const d = new Date(r.run_at);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    ctx.fillText(label, x, H - 6);
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function fmt(n) {
  return n.toLocaleString();
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
    + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 4000);
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openModal() {
  const saved = localStorage.getItem('gh_repo');
  if (saved) document.getElementById('repo-input').value = saved;
  document.getElementById('modal-overlay').classList.add('visible');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

async function triggerSync() {
  const pat  = document.getElementById('pat-input').value.trim();
  const repo = document.getElementById('repo-input').value.trim();

  if (!pat)  { showToast('Enter your GitHub PAT token', 'error'); return; }
  if (!repo) { showToast('Enter your repo (owner/repo)', 'error'); return; }

  localStorage.setItem('gh_repo', repo);
  closeModal();

  const btn = document.getElementById('trigger-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch(
      `https://api.github.com/repos/${repo}/actions/workflows/${WORKFLOW_ID}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      }
    );

    if (res.status === 204) {
      showToast('✓ Sync triggered — check GitHub Actions for progress', 'success');
    } else {
      const err = await res.json();
      showToast('Error: ' + (err.message || res.status), 'error');
    }
  } catch (e) {
    showToast('Network error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Init ──────────────────────────────────────────────────────────────────────

loadData();

// Redraw sparkline on resize
window.addEventListener('resize', () => {
  fetch('./sync_log.json?t=' + Date.now())
    .then(r => r.json())
    .then(logs => drawSparkline(logs.slice(-20)))
    .catch(() => {});
});
</script>
