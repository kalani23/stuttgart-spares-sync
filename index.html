<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stuttgart Spares — Stock Sync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a0a0b;
    --surface: #111113;
    --border:  #1e1e22;
    --accent:  #e8ff47;
    --red:     #ff4d4d;
    --green:   #47ffb2;
    --muted:   #555560;
    --text:    #e8e8f0;
    --subtext: #888898;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,11,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .logo span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); display: block; }

  #trigger-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }

  #trigger-btn:hover { background: #f5ff6e; transform: translateY(-1px); }
  #trigger-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid #00000040;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  #trigger-btn.loading .spinner { display: block; }
  #trigger-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  main { max-width: 1100px; margin: 0 auto; padding: 40px; }

  /* ── Status banner ── */
  #status-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 24px;
  }

  #status-banner.success { border-color: #47ffb240; background: #47ffb208; }
  #status-banner.error   { border-color: #ff4d4d40; background: #ff4d4d08; }

  .status-left { display: flex; align-items: center; gap: 12px; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.success { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.error   { background: var(--red);   box-shadow: 0 0 8px var(--red); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .status-label { font-size: 14px; font-weight: 600; }
  .status-time  { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--subtext); }
  .status-elapsed { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .table-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--subtext);
  }

  .schedule-info {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 24px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #ffffff06; }

  tbody td {
    padding: 14px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--subtext);
  }

  td.date-col { color: var(--text); }
  td.updated-col { color: var(--accent); font-weight: 500; }
  td.instock-col { color: var(--green); }
  td.skus-col { color: var(--text); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .badge.success { background: #47ffb215; color: var(--green); }
  .badge.error   { background: #ff4d4d15; color: var(--red); }
  .badge.dryrun  { background: #ffffff10; color: var(--subtext); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* changes detail */
  .changes-cell { cursor: pointer; }
  .changes-cell:hover { color: var(--accent); }

  .changes-list {
    display: none;
    padding: 12px 24px 12px 48px;
    background: #ffffff04;
    border-top: 1px solid var(--border);
  }

  .changes-list.open { display: block; }

  .change-row {
    display: flex; gap: 16px; align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--subtext);
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }

  .change-row:last-child { border-bottom: none; }
  .change-sku  { color: var(--text); width: 80px; }
  .change-dir  { width: 100px; }
  .change-dir.up   { color: var(--green); }
  .change-dir.down { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.06em;
  }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center; justify-content: center;
  }

  #modal-overlay.visible { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 460px; width: 90%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  #modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  #modal p  { color: var(--subtext); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }

  .modal-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--subtext); display: block; margin-bottom: 6px;
  }

  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  .btn-cancel {
    background: transparent; border: 1px solid var(--border);
    color: var(--subtext); padding: 9px 18px; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .btn-confirm {
    background: var(--accent); border: none; color: #000;
    padding: 9px 18px; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }

  .btn-confirm:hover { background: #f5ff6e; }

  #toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    font-size: 13px; font-weight: 600;
    z-index: 300;
    transform: translateY(60px); opacity: 0;
    transition: all 0.3s ease;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: #47ffb240; color: var(--green); }
  #toast.error   { border-color: #ff4d4d40; color: var(--red); }

  @media (max-width: 600px) {
    main { padding: 20px; }
    header { padding: 16px 20px; }
    thead th, tbody td { padding: 10px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 2L15 6V12L9 16L3 12V6L9 2Z" stroke="#000" stroke-width="1.5"/>
        <circle cx="9" cy="9" r="2" fill="#000"/>
      </svg>
    </div>
    <div>
      <h1>Stuttgart Spares</h1>
      <span>Stock Sync Dashboard</span>
    </div>
  </div>
  <button id="trigger-btn" onclick="openModal()">
    <span class="spinner"></span>
    <span class="btn-text">▶ Trigger Sync</span>
  </button>
</header>

<main>

  <!-- Status banner -->
  <div id="status-banner">
    <div class="status-left">
      <div class="status-dot" id="status-dot"></div>
      <div>
        <div class="status-label" id="status-label">Loading...</div>
        <div class="status-time"  id="status-time">—</div>
      </div>
    </div>
    <div class="status-elapsed" id="status-elapsed">—</div>
  </div>

  <!-- Run history table -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">Run History</div>
      <div class="schedule-info">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M6 3.5V6L7.5 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Daily at 06:00 UTC
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Date / Time</th>
          <th>Status</th>
          <th>SKUs Scraped</th>
          <th>In Stock</th>
          <th>Out of Stock</th>
          <th>Shopify Updated</th>
          <th>Elapsed</th>
          <th>Changes</th>
        </tr>
      </thead>
      <tbody id="history-tbody">
        <tr><td colspan="8" class="empty-state">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</main>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Trigger Manual Sync</h2>
    <p>Starts a full stock sync immediately on GitHub Actions.</p>
    <label class="modal-label">GitHub PAT Token</label>
    <input class="modal-input" type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <label class="modal-label">Repo (owner/repo)</label>
    <input class="modal-input" type="text" id="repo-input" placeholder="kalani23/stuttgart-spares-sync">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="triggerSync()">▶ Run Now</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const WORKFLOW_ID = 'stock_sync.yml';

// ── Load data ─────────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch('./sync_log.json?t=' + Date.now());
    if (!res.ok) throw new Error('not found');
    const logs = await res.json();
    if (!logs.length) throw new Error('empty');
    render(logs);
  } catch(e) {
    document.getElementById('status-label').textContent = 'No sync data yet';
    document.getElementById('history-tbody').innerHTML =
      '<tr><td colspan="8" class="empty-state">No runs yet — trigger a sync to get started.</td></tr>';
  }
}

function render(logs) {
  const latest = logs[logs.length - 1];
  const ok = !latest.errors && latest.status !== 'error';

  // Banner
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + (ok ? 'success' : 'error');
  document.getElementById('status-label').textContent =
    ok ? '✓ Last sync successful' : '⚠ Last sync had errors';
  document.getElementById('status-time').textContent = 'Run at ' + fmtDate(latest.run_at);
  document.getElementById('status-elapsed').textContent =
    latest.elapsed_sec ? latest.elapsed_sec + 's (' + (latest.elapsed_sec/60).toFixed(1) + ' min)' : '—';
  document.getElementById('status-banner').className = ok ? 'success' : 'error';

  // Table — newest first
  const tbody = document.getElementById('history-tbody');
  const rows = [...logs].reverse().map((run, idx) => {
    const isOk      = !run.errors && run.status !== 'error';
    const badge     = run.dry_run
      ? `<span class="badge dryrun">Dry Run</span>`
      : isOk
        ? `<span class="badge success"><span class="badge-dot"></span>Success</span>`
        : `<span class="badge error"><span class="badge-dot"></span>Error</span>`;

    const inStock   = run.in_stock  ?? '—';
    const outStock  = run.out_of_stock ?? '—';
    const updated   = run.updated ?? 0;
    const changes   = run.changes || [];
    const changesTxt = changes.length
      ? `<span class="changes-cell" onclick="toggleChanges('changes-${idx}')">${changes.length} change${changes.length>1?'s':''} ▾</span>`
      : `<span style="color:var(--muted)">none</span>`;

    const changeRows = changes.map(c => `
      <div class="change-row">
        <span class="change-sku">${c.sku}</span>
        <span class="change-dir ${c.in_stock ? 'up' : 'down'}">
          ${c.in_stock ? '↑ back in stock' : '↓ out of stock'}
        </span>
        <span>qty ${c.from_qty} → ${c.to_qty}</span>
      </div>`).join('');

    return `
      <tr>
        <td class="date-col">${fmtDate(run.run_at)}</td>
        <td>${badge}</td>
        <td class="skus-col">${fmt(run.partworks_skus || 0)}</td>
        <td class="instock-col">${typeof inStock === 'number' ? fmt(inStock) : inStock}</td>
        <td style="color:var(--red)">${typeof outStock === 'number' ? fmt(outStock) : outStock}</td>
        <td class="updated-col">${fmt(updated)}</td>
        <td>${run.elapsed_sec ? run.elapsed_sec + 's' : '—'}</td>
        <td>${changesTxt}</td>
      </tr>
      ${changes.length ? `<tr><td colspan="8" style="padding:0"><div class="changes-list" id="changes-${idx}">${changeRows}</div></td></tr>` : ''}
    `;
  }).join('');

  tbody.innerHTML = rows;
}

function toggleChanges(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function fmt(n) { return Number(n).toLocaleString(); }

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})
    + ' ' + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 4000);
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openModal() {
  const saved = localStorage.getItem('gh_repo');
  if (saved) document.getElementById('repo-input').value = saved;
  document.getElementById('modal-overlay').classList.add('visible');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

async function triggerSync() {
  const pat  = document.getElementById('pat-input').value.trim();
  const repo = document.getElementById('repo-input').value.trim();
  if (!pat)  { showToast('Enter your GitHub PAT', 'error'); return; }
  if (!repo) { showToast('Enter repo (owner/repo)', 'error'); return; }
  localStorage.setItem('gh_repo', repo);
  closeModal();

  const btn = document.getElementById('trigger-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch(
      `https://api.github.com/repos/${repo}/actions/workflows/${WORKFLOW_ID}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      }
    );
    if (res.status === 204) {
      showToast('✓ Sync triggered — check GitHub Actions', 'success');
    } else {
      const err = await res.json();
      showToast('Error: ' + (err.message || res.status), 'error');
    }
  } catch(e) {
    showToast('Network error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadData();
</script>
</body>
</html>
